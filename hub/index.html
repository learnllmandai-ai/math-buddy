<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engineering Hub</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/00d4ff/circuit.png">
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body style="flex-direction: column;">
    <nav style="position: absolute; top: 20px; right: 20px;">
        <button onclick="logout()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
    </nav>
    <h1 id="welcome-text">Welcome, <span id="display-name" style="color:#00d4ff;">Engineer</span></h1>
    <div class="grid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 40px;">
        <div onclick="location.href='../HydratePro/index.html'" style="padding:40px; background:rgba(255,255,255,0.05); border-radius:15px; cursor:pointer;">💧 HydratePro</div>
        <div onclick="location.href='#'" style="padding:40px; background:rgba(255,255,255,0.05); border-radius:15px; cursor:pointer;">🤖 Robotics Lab</div>
    </div>
    <script>
        window.onload = function() {
            const name = localStorage.getItem('currentName');
            const dob = localStorage.getItem('currentDOB');
            if (!localStorage.getItem('isLoggedIn')) { window.location.href = "../index.html"; return; }
            document.querySelector('#display-name').innerText = name;
            if (dob) {
                const t = new Date(); const b = new Date(dob);
                if (t.getMonth() === b.getMonth() && t.getDate() === b.getDate()) {
                    const d = document.querySelector('#display-name');
                    d.style.color = "#FFD700";
                    document.getElementById('welcome-text').innerHTML = `🌟 HAPPY BIRTHDAY, ${name.toUpperCase()}! 🌟`;
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#FFD700', '#ffffff'] });
                }
            }
        };
        function logout() {
            localStorage.clear();
            window.location.href = "../index.html";
        }
    </script>
</body>
</html>
