<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kite Analytics</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Analytics Control</h2>
            <div class="language-toggles">
                <label><input type="checkbox" id="python" checked> Python</label>
                <label><input type="checkbox" id="javascript" checked> JavaScript</label>
                <label><input type="checkbox" id="java" checked> Java</label>
                <label><input type="checkbox" id="go" checked> Go</label>
                <label><input type="checkbox" id="php" checked> PHP</label>
                <label><input type="checkbox" id="c" checked> C</label>
                <label><input type="checkbox" id="csharp" checked> C#</label>
                <label><input type="checkbox" id="cpp" checked> C++</label>
                <label><input type="checkbox" id="typescript" checked> TypeScript</label>
                <label><input type="checkbox" id="htmlcss" checked> HTML/CSS</label>
                <label><input type="checkbox" id="kotlin" checked> Kotlin</label>
                <label><input type="checkbox" id="scala" checked> Scala</label>
                <label><input type="checkbox" id="ruby" checked> Ruby</label>
                <label><input type="checkbox" id="bash" checked> Bash</label>
            </div>
            <div class="health">
                <h3>System Health</h3>
                <div id="health-status">Optimal</div>
            </div>
        </aside>
        <main class="main-content">
            <h1>Kite Analytics Dashboard</h1>
            <canvas id="analyticsChart"></canvas>
            <div class="terminal">
                <h3>Live Terminal</h3>
                <div id="terminal-output"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
