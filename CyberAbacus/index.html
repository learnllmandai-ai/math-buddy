<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Abacus | Elite Training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/00d4ff/abacus.png">
</head>
<body>
    <div class="cyber-container">
        <header>
            <div class="logo">
                <span class="icon">🌀</span> CYBER ABACUS
            </div>
            <div class="stats">
                <div class="stat-box">HIGH SCORE: <span id="high-score">0</span></div>
                <div class="stat-box timer">TIME: <span id="timer">60</span>s</div>
            </div>
        </header>

        <main id="game-screen">
            <div id="start-overlay">
                <h1>Ready, Engineer?</h1>
                <button onclick="startGame()">START MISSION</button>
            </div>

            <div id="quiz-container" style="display: none;">
                <div id="problem-list">
                    </div>
                <div class="input-wrapper">
                    <input type="number" id="answer-input" placeholder="?" autocomplete="off">
                </div>
            </div>
        </main>

        <footer>
            <div class="controls-hint">Press [Enter] to Submit</div>
            <div class="score-board">
                <span class="correct">✓ <span id="correct-count">0</span></span>
                <span class="wrong">✗ <span id="wrong-count">0</span></span>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
