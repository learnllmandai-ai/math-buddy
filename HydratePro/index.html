<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydratePro</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/00d4ff/circuit.png">
    <style>
        :root { --primary: #00d4ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 80px; }
        .back-btn { position: fixed; top: 20px; left: 20px; background: var(--glass); border: 1px solid rgba(0,212,255,0.3); color: var(--primary); padding: 10px 18px; border-radius: 12px; text-decoration: none; font-weight: bold; backdrop-filter: blur(10px); transition: 0.3s; z-index: 999; }
        .back-btn:hover { background: rgba(0,212,255,0.15); border-color: var(--primary); }
        .setup-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 130, 70, 0.1)); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; }
        .setup-screen.active { display: flex; }
        .setup-container { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px 30px; max-width: 380px; width: 90%; text-align: center; backdrop-filter: blur(20px); }
        .setup-container h1 { margin-top: 0; font-size: 1.8rem; margin-bottom: 10px; }
        .setup-container p { color: rgba(255,255,255,0.6); margin-bottom: 25px; }
        .setup-input { width: 100%; padding: 12px 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; }
        .setup-input::placeholder { color: rgba(255,255,255,0.4); }
        .setup-input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .setup-submit { width: 100%; padding: 14px; margin-top: 20px; background: var(--primary); border: none; border-radius: 12px; color: black; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .setup-submit:hover { opacity: 0.9; }
        .oauth-divider { text-align: center; color: rgba(255,255,255,0.4); margin: 25px 0 15px; font-size: 0.85rem; position: relative; }
        .oauth-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.1); z-index: 0; }
        .oauth-divider { position: relative; z-index: 1; background: var(--glass); padding: 0 10px; }
        .oauth-buttons { display: flex; gap: 12px; }
        .oauth-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 0.9rem; }
        .oauth-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .oauth-btn:active { transform: scale(0.98); }
        .oauth-google:hover { background: rgba(234, 67, 53, 0.15); border-color: rgba(234, 67, 53, 0.3); color: #ea4335; }
        .oauth-microsoft:hover { background: rgba(0, 120, 215, 0.15); border-color: rgba(0, 120, 215, 0.3); color: #0078d4; }
        .app-container { width: 90%; max-width: 400px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 30px; text-align: center; backdrop-filter: blur(20px); }
        .welcome-banner { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 15px; margin-bottom: 15px; font-size: 0.9rem; color: var(--primary); border: 1px solid rgba(255,255,255,0.05); }
        .circle-progress { position: relative; width: 220px; height: 220px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        svg { width: 220px; height: 220px; transform: rotate(-90deg); overflow: visible; }
        circle { fill: none; stroke-width: 15; stroke-linecap: round; }
        circle:nth-child(1) { stroke: rgba(255,255,255,0.05); }
        #progress-ring { stroke: var(--primary); stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: 1s; filter: drop-shadow(0 0 8px var(--primary)); }
        .percentage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #percent-num { font-size: 3.5rem; font-weight: 800; display: block; }
        .location-display { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 0.85rem; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .add-btn { background: var(--primary); border: none; padding: 15px; border-radius: 15px; color: black; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .add-btn:active { transform: scale(0.95); }
        .reset-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #888; padding: 10px; border-radius: 12px; cursor: pointer; margin-top: 10px; }
        .climate-alert { background: linear-gradient(135deg, rgba(255, 130, 70, 0.15), rgba(255, 90, 50, 0.15)); border: 1px solid rgba(255, 130, 70, 0.4); padding: 10px 15px; border-radius: 15px; margin-bottom: 15px; font-size: 0.85rem; font-weight: 600; color: #ffb088; display: flex; align-items: center; gap: 8px; }
        .climate-alert::before { content: '🔥'; font-size: 1.2rem; }
        .hidden { display: none !important; }
        .weather-info { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 15px; font-size: 0.9rem; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.05); }
        .extreme-heat { --primary: #ff5722 !important; }
    </style>
</head>
<body>
    <div id="setup-screen" class="setup-screen active">
        <div class="setup-container">
            <h1>Welcome to HydratePro</h1>
            <p>Let's personalize your hydration goals</p>

            <div id="setup-form">
                <input type="text" id="setup-name" class="setup-input" placeholder="Your Name" maxlength="30">
                <input type="number" id="setup-age" class="setup-input" placeholder="Your Age" min="1" max="120">
                <input type="text" id="setup-city" class="setup-input" placeholder="City Name (e.g., London)">
                <button class="setup-submit" onclick="completeSetup()">Get Started</button>
            </div>

            <div class="oauth-divider">or sign in with</div>

            <div class="oauth-buttons">
                <button class="oauth-btn oauth-google" onclick="signInWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><path d="M12 6v6m0 6v0"/><path d="M6 12h6m6 0h0"/>
                    </svg>
                    Google
                </button>
                <button class="oauth-btn oauth-microsoft" onclick="signInWithMicrosoft()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/>
                    </svg>
                    Microsoft
                </button>
            </div>
        </div>
    </div>

    <a href="../hub/index.html" class="back-btn">← Main Hub</a>
    <div class="app-container">
        <h1>Hydrate<span>Pro</span></h1>
        <div id="welcome-banner" class="welcome-banner hidden"></div>
        <div id="location-display" class="location-display hidden"></div>
        <div id="climate-alert" class="climate-alert hidden"></div>
        <div id="weather-info" class="weather-info"></div>
        <div class="circle-progress">
            <svg viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90"></circle>
                <circle id="progress-ring" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="percentage">
                <span id="percent-num">0</span>
                <p><span id="current-ml">0</span> / <span id="goal-display">3500</span>ml</p>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><small>REMAINING</small><h3 id="rem-ml">3500ml</h3></div>
            <div class="stat-card"><small>STATUS</small><h3 id="status-text">Dehydrated</h3></div>
        </div>
        <div class="controls">
            <button class="add-btn" onclick="addWater(250)">+ 250ml Glass</button>
            <button class="add-btn" onclick="addWater(500)">+ 500ml Bottle</button>
            <button class="reset-btn" onclick="resetWater()">Reset</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
