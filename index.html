<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Suite | Login</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/00d4ff/circuit.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <h2 id="form-title">Welcome<span>Back</span></h2>
        <p id="form-subtext">Enter your details to access the hub</p>
        <div class="input-group">
            <input type="text" id="fullName" placeholder="Enter your Name" required>
            <input type="password" id="password" placeholder="Password" required>
            <div id="signup-extra-fields" style="display: none;">
                <input type="number" id="age" placeholder="Your Age">
                <input type="text" id="city" placeholder="Your City">
                <input type="date" id="dob">
            </div>
        </div>
        <button id="main-btn" onclick="handleAuth()">Login</button>
        <p id="error-msg" style="color: #ff4d4d; font-size: 0.8rem; margin-top: 10px;"></p>
        <p id="toggle-msg">Don't have an account? <span onclick="toggleMode()" style="color: #00d4ff; cursor: pointer;">Create Account</span></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
